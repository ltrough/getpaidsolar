<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule With Austin | Get Paid Solar</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #061426, #0b2a4a);
      color: #061426;
    }

    .container {
      max-width: 700px;
      margin: 40px auto;
      background: #fff;
      padding: 35px;
      border-radius: 18px;
      box-shadow: 0 12px 35px rgba(0,0,0,0.3);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      margin-bottom: 25px;
      font-size: 18px;
    }

    input, select, textarea {
      width: 100%;
      padding: 15px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-bottom: 6px;
    }

    .helper-text {
      display: block;
      font-size: 13px;
      color: #666;
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .highlight {
      color: #c99a00;
      font-weight: bold;
    }

    button {
      width: 100%;
      padding: 16px;
      background: #ffc400;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      color: #061426;
    }

    button:hover {
      background: #ffcf33;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Get Paid Solar</h1>
    <p class="subtitle">Complete this form, then schedule your appointment with Austin.</p>

    <form
      action="https://formspree.io/f/xaqkgqzz"
      method="POST"
      enctype="multipart/form-data"
    >

      <input type="hidden" name="rep" value="Austin">
      <input type="hidden" name="_redirect" value="https://calendly.com/getpaidsolar-info/austin">

      <input type="text" name="name" placeholder="Full Name" required>
      <input type="tel" name="phone" placeholder="Phone Number" required>
      <input type="email" name="email" placeholder="Email Address" required>
      <input type="text" name="address" placeholder="Home Address" required>

      <select name="utility_company" required>
        <option value="">Select Utility Company</option>
        <option value="APS">APS</option>
        <option value="SRP">SRP</option>
        <option value="Other">Other</option>
      </select>

      <input
    type="text"
    name="average_monthly_bill"
    placeholder="Estimated Current Utility Bill (Optional)"
>

      <label for="utilityBill">
        Upload APS/SRP Bill <span class="highlight">(Recommended)</span>
      </label>

      <small class="helper-text">
        <strong>Recommended:</strong> Uploading your bill allows us to review your account in advance and provide a faster, more accurate savings estimate.
      </small>

      <input
        type="file"
        id="utilityBill"
        name="utilityBill"
        accept=".pdf,.jpg,.jpeg,.png"
		multiple
		required
      >

      <textarea
        name="notes"
        placeholder="Notes or anything we should know before the appointment"
        rows="4"
      ></textarea>

      <button type="submit">Continue to Schedule Appointment</button>
    </form>
  </div>
  
 <script>
document.querySelector("form").addEventListener("submit", async function (e) {
  e.preventDefault();

  const form = this;
  const formData = new FormData(form);

  const fullName = formData.get("name")?.trim() || "";
  const email = formData.get("email")?.trim() || "";
  const rawPhone = formData.get("phone")?.trim() || "";
const digits = rawPhone.replace(/\D/g, "");

const phone = digits.length === 10
  ? `(${digits.slice(0, 3)}) ${digits.slice(3, 6)}-${digits.slice(6)}`
  : rawPhone;
  const address = formData.get("address")?.trim() || "";
  const utility = formData.get("utility_company") || "";
  const bill = formData.get("average_monthly_bill")?.trim() || "";

  const nameParts = fullName.split(" ");
  const firstName = nameParts[0] || "";
  const lastName = nameParts.slice(1).join(" ") || "";

  const calendlyUrl =
    "https://calendly.com/getpaidsolar-info/austin" +
    "?first_name=" + encodeURIComponent(firstName) +
    "&last_name=" + encodeURIComponent(lastName) +
    "&email=" + encodeURIComponent(email) +
    "&a1=" + encodeURIComponent(address) +
    "&a2=" + encodeURIComponent(phone) +
    "&a3=" + encodeURIComponent(utility) +
    "&a4=" + encodeURIComponent(bill);

  const response = await fetch(form.action, {
    method: "POST",
    body: formData,
    headers: { "Accept": "application/json" }
  });

  if (response.ok) {
    window.location.href = calendlyUrl;
  } else {
    alert("There was a problem submitting the form. Please try again.");
  }
});
</script>

</body>
</html>
